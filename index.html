<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#050505">
    <title>NTangible &times; IMG Academy - Integration Proposal</title>
    <link rel="icon" type="image/png" href="/IMG.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Rajdhani:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">

    <style>
        html, body, #root { background-color: #050505; margin: 0; min-height: 100vh; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; color: #f8fafc; -webkit-text-size-adjust: 100%; }
        #initial-loader { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; background: #050505; color: #f8fafc; z-index: 9999; }
        #initial-loader .brand { font-family: 'Inter', system-ui, sans-serif; font-weight: 700; letter-spacing: 0.18em; font-size: 14px; color: #94a3b8; text-transform: uppercase; }
        #initial-loader .title { font-family: 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 20px; color: #f1f5f9; }
        #initial-loader .spinner { width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(148, 163, 184, 0.25); border-top-color: #f8fafc; animation: loader-spin 0.9s linear infinite; }
        @keyframes loader-spin { to { transform: rotate(360deg); } }
        .app-ready #initial-loader { opacity: 0; pointer-events: none; transition: opacity 220ms ease-out; }
    </style>
</head>
<body>
    <div id="root">
        <div id="initial-loader" role="status" aria-live="polite">
            <div class="spinner" aria-hidden="true"></div>
            <div class="title">Loading IMG Academy</div>
            <div class="brand">NTangible Integration Proposal</div>
        </div>
    </div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
